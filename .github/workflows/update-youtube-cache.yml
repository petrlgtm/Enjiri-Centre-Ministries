name: Update YouTube Cache

on:
  schedule:
    - cron: '0 4 * * *' # Run at 4:00 AM UTC daily
  workflow_dispatch: # Allow manual trigger

jobs:
  update-cache:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch YouTube Videos
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: node scripts/fetch-youtube.js

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add public/youtube-cache.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update youtube video cache [skip ci]" && git push)
